name: Java CI with Gradle

on:
  push:
    branches: ["main", "master"]  # Added master since your terminal showed master earlier
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest
    # Everything below here must be indented further than 'build:'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' # Updated to 21 to match your build.gradle.kts

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build
